name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint-and-precommit:
    name: Lint & Pre-commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up pre-commit Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install goimports
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.5"

      - name: Run Hadolint Dockerfile Linter
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true

      - name: Run pre-commit checks
        run: |
          echo "=== CLI Tool Versions ==="
          terraform --version || echo "terraform not installed"
          tflint --version || echo "tflint not installed"
          go version || echo "go not installed"
          python --version || echo "python not installed"
          pre-commit --version || echo "pre-commit not installed"

          echo "=== Running Pre-Commit ==="
          SKIP=markdown-link-check,hadolint pre-commit run --all-files --show-diff-on-failure --verbose

  go-tests:
    name: Go Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir:
          - "reference-architectures/networking-for-ai-inference/src/bbr-ext-proc-go"
          - "demos/service-extensions-gke-gateway/src/dlp-ext-proc"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
          cache-dependency-path: '${{ matrix.dir }}/go.sum'

      - name: Module Synchronization
        run: |
          cd ${{ matrix.dir }}
          go mod tidy

      - name: Run Go tests
        run: |
          cd ${{ matrix.dir }}
          go test -v ./...

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir:
          - "demos/agent-gateway/src/income-verification-api"
          - "demos/agent-gateway/src/legacy-dms"
          - "demos/agent-gateway/src/corporate-email"
          - "demos/agent-gateway/src/mortgage-agent"
          - "demos/service-extensions-gke-gateway/src/income-verification-api"
          - "demos/service-extensions-gke-gateway/src/legacy-dms"
          - "demos/service-extensions-gke-gateway/src/corporate-email"
          - "demos/service-extensions-gke-gateway/src/mortgage-agent"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "${{ matrix.dir }}/pyproject.toml"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync Dependencies
        run: |
          cd ${{ matrix.dir }}
          uv sync --all-extras --dev

      - name: Run Ruff Lint
        run: |
          cd ${{ matrix.dir }}
          uv run ruff check

      - name: Run Ruff Format Check
        run: |
          cd ${{ matrix.dir }}
          uv run ruff format --check

      - name: Run Pytest
        run: |
          cd ${{ matrix.dir }}
          uv run pytest
